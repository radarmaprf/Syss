name: Telegram Alerts Parser

on:
  schedule:
    # Запуск каждые 5 минут (можно изменить интервал)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Позволяет запускать вручную из вкладки Actions

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # Чтобы использовать PAT для push

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Commit and push state files (alerts.json, processed_posts.json)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add alerts.json processed_posts.json
          git diff --staged --quiet || git commit -m "Update alert states [skip ci]"
          git push https://${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
